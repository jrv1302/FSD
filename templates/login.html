{% extends "base.html" %}
{% block title %}Login – FinComplaints AI{% endblock %}

{% block content %}
<section class="auth-section py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card border-0 shadow-lg auth-card">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <div class="auth-icon mx-auto mb-3"><i class="bi bi-box-arrow-in-right fs-3 text-primary"></i></div>
              <h3 class="fw-bold">Welcome Back</h3>
              <p class="text-muted small">Sign in to your account</p>
            </div>

            <form id="loginForm" method="POST" action="{{ url_for('login') }}" novalidate>
              <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="invalid-feedback" id="emailErr">Please enter a valid email.</div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input type="password" name="password" id="loginPw" class="form-control" placeholder="••••••" required>
                  <button type="button" class="btn btn-outline-secondary toggle-pw" data-target="loginPw">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
                <div class="invalid-feedback" id="pwErr">Password is required.</div>
              </div>

              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                  <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
              </div>
            </form>

            <hr class="my-3">
            <div class="text-center small text-muted">
              <p class="mb-1">Don't have an account? <a href="{{ url_for('register') }}" class="fw-semibold">Register</a></p>
              <p class="mb-0 mt-3 p-2 bg-light rounded">
                <strong>Admin:</strong> admin@fincomplaints.com / admin123
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
